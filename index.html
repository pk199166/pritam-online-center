<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रीतम ऑनलाइन सेंटर - पीरी बाज़ार</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 15px; }
        .header { background: linear-gradient(135deg, #28a745, #1e7e34); color: white; padding: 30px 15px; text-align: center; border-radius: 12px; margin-bottom: 25px; }
        .main-container { max-width: 800px; margin: 0 auto; }
        .section-title { color: #1e7e34; margin: 20px 0 10px 0; border-left: 5px solid #28a745; padding-left: 10px; font-size: 1.3rem; }
        .notice-card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 15px; border-top: 4px solid #ff9800; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .notice-card h3 { color: #d35400; margin-bottom: 8px; }
        .booking-box { background: white; padding: 20px; border-radius: 10px; border-top: 4px solid #28a745; text-align: center; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; }
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🏁 प्रीतम ऑनलाइन सेंटर</h1>
        <p>पीरी बाज़ार, लखीसराय (बिहार) - डिजिटल सेवा केंद्र</p>
    </div>
    <div class="main-container">
        <div class="section-title">📢 लाइव सरकारी फॉर्म एवं सूचनाएं</div>
        <div id="live-notice-board">लोड हो रहा है...</div>
        
        <div class="section-title">📅 दुकान आने के लिए समय स्लॉट बुक करें</div>
        <div class="booking-box">
            <input type="date" id="apt-date">
            <select id="apt-time">
                <option value="">समय स्लॉट चुनें</option>
                <option value="08:00 AM - 10:00 AM">सुबह 08:00 से 10:00</option>
                <option value="10:00 AM - 01:00 PM">सुबह 10:00 से दोपहर 01:00</option>
                <option value="01:00 PM - 04:00 PM">दोपहर 01:00 से शाम 04:00</option>
                <option value="04:00 PM - 07:00 PM">शाम 04:00 से रात 07:00</option>
            </select>
            <button id="btn-customer-book">अपॉइंटमेंट बुक करें 🚀</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        import { initIndexManager, bookCustomerAppointment } from "./index_logic.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnB1JHi8K1TZtUk-SQ9r4pzYik_PLwqyQ",
            authDomain: "pritam-online-center.firebaseapp.com",
            projectId: "pritam-online-center",
            storageBucket: "pritam-online-center.firebasestorage.app",
            messagingSenderId: "310541912344",
            appId: "1:310541912344:web:3f05beef1626edfe2f766d",
            measurementId: "G-T87S6TXHR6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        initIndexManager(db);

        const currentCustomerUID = "DEMO_USER_ID";
        const currentCustomerName = "सतीश कुमार (ग्राहक)";

        document.getElementById('btn-customer-book').onclick = function() {
            bookCustomerAppointment(currentCustomerUID, currentCustomerName);
        };
    </script>
</body>
</html>
