<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>प्रीतम ऑनलाइन सेंटर - पीरी बाज़ार</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding: 15px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-top: 6px solid #28a745; }
        h1 { text-align: center; color: #28a745; margin-bottom: 5px; font-size: 1.8rem; }
        .shop-info { text-align: center; color: #666; font-size: 14px; margin-bottom: 20px; }
        
        /* 🔍 सर्च बॉक्स का डिज़ाइन */
        .search-box-section { background: #e9ecef; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ced4da; }
        .search-box-section h3 { font-size: 15px; margin-bottom: 10px; color: #495057; display: flex; align-items: center; gap: 5px; }
        .search-input-group { display: flex; gap: 8px; }
        .search-input-group input { flex: 1; padding: 10px; border: 1px solid #ced4da; border-radius: 6px; font-size: 15px; }
        .search-input-group button { padding: 10px 15px; background: #28a745; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* 📋 सर्च रिज़ल्ट का डिज़ाइन */
        .search-results { display: none; margin-top: 15px; background: #fff; border-left: 4px solid #17a2b8; padding: 12px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .history-item { border-bottom: 1px dashed #dee2e6; padding: 10px 0; font-size: 14px; }
        .history-item:last-child { border-bottom: none; }
        .status-badge { padding: 2px 6px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .status-done { background: #d4edda; color: #155724; }
        .status-pending { background: #fff3cd; color: #856404; }
        
        .announcement { background: #fff3cd; color: #856404; padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 20px; text-align: center; font-size: 14px; border: 1px solid #ffeeba; }
        .btn-booking { display: block; width: 100%; padding: 14px; background: #007bff; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; text-align: center; text-decoration: none; box-shadow: 0 3px 6px rgba(0,123,255,0.2); }
    </style>
</head>
<body>

    <div class="container">
        <h1> must_be_redacted_for_privacy_reasons</h1>
        <div class="shop-info">📍 पीरी बाज़ार, लखीसराय (बिहार)</div>

        <!-- 📢 लाइव घोषणा / नोटिस बोर्ड -->
        <div id="live-announcement" class="announcement">📢 दुकान खुली है, आप अपना काम करवा सकते हैं।</div>

        <!-- 🔍 ग्राहक सर्च बॉक्स (नया फीचर) -->
        <div class="search-box-section">
            <h3>🔍 अपना काम और पैसे का हिसाब देखें</h3>
            <div class="search-input-group">
                <input type="text" id="cust-search-query" placeholder="अपना नाम या मोबाइल नंबर डालें...">
                <button id="btn-cust-search">खोजें 🔎</button>
            </div>
            
            <!-- यहाँ सर्च का रिज़ल्ट दिखेगा -->
            <div id="search-results-area" class="search-results">
                <h4 style="color: #17a2b8; margin-bottom: 8px; font-size: 15px;">📊 आपके काम का इतिहास (History):</h4>
                <div id="history-list"></div>
            </div>
        </div>

        <!-- 📅 ऑनलाइन अपॉइंटमेंट बटन -->
        <a href="#" id="booking-btn" class="btn-booking">📅 घर बैठे अपॉइंटमेंट बुक करें</a>
    </div>

    <!-- लॉजिक फ़ाइल को मॉड्यूल की तरह जोड़ना -->
    <script type="module" src="index_logic.js"></script>
</body>
</html>
